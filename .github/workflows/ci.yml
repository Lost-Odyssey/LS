name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'   # nightly full run (includes the slow test_sim)

jobs:
  linux:
    name: Linux (Ubuntu, LLVM 18)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake ninja-build git wget lsb-release \
            software-properties-common gnupg ccache \
            zlib1g-dev libzstd-dev libtinfo-dev

      - name: Cache LLVM 18 .deb downloads
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/*.deb
          # v2: the v1 blob (fixed key since run #1, never rewritten) started
          # failing to restore with a tar exit-code-2 error -- likely a stale
          # archive incompatible with a runner image tar/zstd update. Bumping
          # the key discards it and writes a fresh one.
          key: apt-llvm18-${{ runner.os }}-v2

      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          # Unique key per commit so every run saves a fresh cache; restore-keys
          # falls back to the most recent prior cache for this OS.
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Install LLVM 18 (dev package only)
        run: |
          # Add the apt.llvm.org repo the same way llvm.sh does, but skip its
          # default install list (clang/lldb/lld/clangd) -- `llvm-18-dev`
          # doesn't depend on any of those (confirmed via `apt-cache depends
          # llvm-18-dev`), and we don't need them for a CMake-only build.
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          sudo add-apt-repository -y "deb https://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main"
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-18-dev

      - name: Configure
        run: |
          cmake -B build -G Ninja -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
          # Do NOT pass -DCMAKE_BUILD_TYPE=Release: three library targets
          # (ls_os_backend/ls_memcheck/ls_profiler) hardcode a per-config
          # ARCHIVE_OUTPUT_DIRECTORY_RELEASE copied from the Windows
          # multi-config (Visual Studio) convention. Under a single-config
          # generator like Ninja, setting CMAKE_BUILD_TYPE=Release makes
          # CMake honor that override and split the archives into
          # build/Release/ while the `ls` binary itself stays in build/,
          # breaking AOT linking (`cannot find -lls_os_backend`).
          # The non-MSVC compile options already default to -O2 when
          # CMAKE_BUILD_TYPE isn't "Debug", so this loses no optimization.

      - name: Build
        run: |
          ccache --max-size=500M
          ccache --zero-stats
          cmake --build build -j "$(nproc)"
          ccache --show-stats

      - name: Test
        working-directory: build
        run: |
          # Heavy "repetition for confidence" tests dominate CI Test time:
          #   test_sim        ~25 samples x (JIT+AOT+memcheck)
          #   test_oran       ~20 samples x (JIT+AOT+memcheck)
          #   test_repl_l010  60-run soak for an already-fixed 8% flaky UAF
          # Skip them on push/PR for fast feedback; the nightly schedule runs the
          # full suite (anchored names so test_simd etc. still run every push).
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ctest -j "$(nproc)" --output-on-failure --repeat until-pass:2
          else
            ctest -j "$(nproc)" --output-on-failure --repeat until-pass:2 \
              -E '^(test_sim|test_oran|test_repl_l010)$'
          fi
