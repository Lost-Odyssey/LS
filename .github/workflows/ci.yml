name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: Linux (Ubuntu, LLVM 18)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake ninja-build git wget lsb-release \
            software-properties-common gnupg \
            zlib1g-dev libzstd-dev libtinfo-dev

      - name: Cache LLVM 18 .deb downloads
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-llvm18-${{ runner.os }}-v1

      - name: Install LLVM 18 (dev package only)
        run: |
          # Add the apt.llvm.org repo the same way llvm.sh does, but skip its
          # default install list (clang/lldb/lld/clangd) -- `llvm-18-dev`
          # doesn't depend on any of those (confirmed via `apt-cache depends
          # llvm-18-dev`), and we don't need them for a CMake-only build.
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          sudo add-apt-repository -y "deb https://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main"
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-18-dev

      - name: Configure
        run: |
          cmake -B build -G Ninja -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm
          # Do NOT pass -DCMAKE_BUILD_TYPE=Release: three library targets
          # (ls_os_backend/ls_memcheck/ls_profiler) hardcode a per-config
          # ARCHIVE_OUTPUT_DIRECTORY_RELEASE copied from the Windows
          # multi-config (Visual Studio) convention. Under a single-config
          # generator like Ninja, setting CMAKE_BUILD_TYPE=Release makes
          # CMake honor that override and split the archives into
          # build/Release/ while the `ls` binary itself stays in build/,
          # breaking AOT linking (`cannot find -lls_os_backend`).
          # The non-MSVC compile options already default to -O2 when
          # CMAKE_BUILD_TYPE isn't "Debug", so this loses no optimization.

      - name: Build
        run: cmake --build build -j "$(nproc)"

      - name: Test
        working-directory: build
        run: ctest -j "$(nproc)" --output-on-failure --repeat until-pass:2
